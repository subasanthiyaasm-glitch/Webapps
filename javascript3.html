<!DOCTYPE html>
<head>
    <body>
        <button id="btn">click me</button>
        <script>
            let btn =document.get element by id("btn");
            btnadd event.listiner("click.function"){
            btn.style transform="translatex (-5px)";
            set timeout ()=>{
                btn.style transform = "translatex (5px)";
            },100);
            set timeout ()=>{
                btn.style transform="translatex (0)"; 
            },200)
            });
        </script>
    </body>
</head>
