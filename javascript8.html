<!DOCTYPE html>
<html>
<head>
    <title>Password Generator</title>
</head>
<body>
    <h1>Password Generator</h1>
    <button onclick="generate()">Generate Password</button>
    <p id="password"></p>
    <script>
        function generate() {
            let chsrs = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";
            let password = "";
            for (let i = 0; i < 12; i++) {
                password += chsrs.charAt(Math.floor(Math.random() * chsrs.length));
            }
            document.getElementById("password").innerHTML = password;
        }
    </script>
</body>
</html>
